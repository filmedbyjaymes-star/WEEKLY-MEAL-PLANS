<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black"/>
<meta name="apple-mobile-web-app-title" content="Meal Plan"/>
<title>Meal Plan</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0a0a;
  --surface:#111111;
  --surface2:#1a1a1a;
  --surface3:#222222;
  --border:#2a2a2a;
  --text:#ffffff;
  --muted:#666666;
  --muted2:#444444;
  --red:#e63329;
  --red-dim:rgba(230,51,41,0.12);
  --red-border:rgba(230,51,41,0.3);
  --green:#22c55e;
  --green-dim:rgba(34,197,94,0.1);
  --green-border:rgba(34,197,94,0.25);
  --blue:#3b82f6;
  --yellow:#f59e0b;
  --pink:#ec4899;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overscroll-behavior:none}
.app{max-width:430px;margin:0 auto;padding-bottom:env(safe-area-inset-bottom,20px)}

/* HERO */
.hero{position:relative;overflow:hidden;background:#000}
.hero-img{width:100%;height:220px;object-fit:cover;object-position:center top;opacity:0.55;display:block}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,0) 20%,rgba(10,10,10,1) 100%)}
.hero-content{position:absolute;bottom:0;left:0;right:0;padding:0 20px 20px}
.hero-badge{display:inline-flex;align-items:center;gap:6px;background:var(--red);padding:4px 10px;border-radius:4px;font-size:10px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;margin-bottom:8px}
.hero-title{font-size:32px;font-weight:700;line-height:1;letter-spacing:-.02em}
.hero-title span{color:var(--red)}
.hero-sub{font-size:12px;color:var(--muted);margin-top:4px;font-weight:400;letter-spacing:.02em}

/* DAY TABS */
.tabs{display:flex;gap:1px;background:var(--border);margin:0;border-bottom:1px solid var(--border)}
.tab{flex:1;padding:14px 10px;text-align:center;cursor:pointer;background:var(--surface);transition:background .15s;border:none;outline:none}
.tab-name{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:.01em;display:block}
.tab-type{font-size:10px;font-weight:500;color:var(--muted2);display:block;margin-top:2px;letter-spacing:.08em;text-transform:uppercase}
.tab.active{background:var(--bg)}
.tab.active .tab-name{color:var(--text)}
.tab.active-high .tab-type{color:var(--red)}
.tab.active-low .tab-type{color:var(--green)}

/* SECTIONS */
.section{padding:20px 16px 0}
.section-label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.15em;text-transform:uppercase;margin-bottom:12px;display:flex;align-items:center;gap:8px}
.section-label::after{content:'';flex:1;height:1px;background:var(--border)}

/* STAT CARDS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:0}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px}
.stat-card.wide{grid-column:1/-1}
.stat-label{font-size:10px;font-weight:500;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
.stat-val{font-size:28px;font-weight:700;letter-spacing:-.02em;line-height:1;font-family:'DM Mono',monospace}
.stat-val.cal{color:var(--text)}
.stat-val.pro{color:#60a5fa}
.stat-val.carb{color:#f59e0b}
.stat-val.fat{color:#ec4899}
.stat-unit{font-size:11px;font-weight:500;color:var(--muted);margin-top:3px}

/* MACRO BAR */
.macro-bar-wrap{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:14px;grid-column:1/-1}
.macro-bar-labels{display:flex;justify-content:space-between;margin-bottom:8px}
.macro-bar-label{font-size:11px;font-weight:500}
.macro-bar-track{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;display:flex;gap:2px}
.macro-bar-seg{height:100%;border-radius:2px;transition:width .5s ease}
.macro-bar-legend{display:flex;gap:12px;margin-top:8px;flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--muted)}
.legend-dot{width:6px;height:6px;border-radius:50%}

/* DAY TYPE BADGE */
.day-badge{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;margin-bottom:0}
.day-badge.high{background:var(--red-dim);border:1px solid var(--red-border)}
.day-badge.low{background:var(--green-dim);border:1px solid var(--green-border)}
.badge-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.high .badge-dot{background:var(--red)}
.low .badge-dot{background:var(--green)}
.badge-label{font-size:11px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.high .badge-label{color:var(--red)}
.low .badge-label{color:var(--green)}
.badge-desc{font-size:11px;color:var(--muted);margin-left:auto}

/* MEAL CARDS */
.meal-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;margin-bottom:8px;overflow:hidden;cursor:pointer;transition:border-color .15s}
.meal-card:active{opacity:.85}
.meal-card.open{border-color:var(--surface3)}
.meal-head{display:flex;align-items:center;gap:12px;padding:14px}
.meal-icon-wrap{width:42px;height:42px;border-radius:10px;background:var(--surface2);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.meal-info{flex:1;min-width:0}
.meal-time-label{font-size:10px;font-weight:500;color:var(--muted);text-transform:uppercase;letter-spacing:.08em}
.meal-title{font-size:15px;font-weight:600;letter-spacing:-.01em;margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.meal-chips{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.chip{font-size:10px;font-weight:600;padding:2px 6px;border-radius:4px;letter-spacing:.02em;font-family:'DM Mono',monospace}
.chip-kcal{color:var(--muted);background:var(--surface2)}
.chip-p{color:#60a5fa;background:rgba(96,165,250,0.1)}
.chip-c{color:#f59e0b;background:rgba(245,158,11,0.1)}
.chip-f{color:#ec4899;background:rgba(236,72,153,0.1)}
.chevron{color:var(--muted2);font-size:16px;transition:transform .2s;flex-shrink:0}
.meal-card.open .chevron{transform:rotate(180deg)}

/* MEAL BODY */
.meal-body{display:none;padding:0 14px 14px;border-top:1px solid var(--border)}
.meal-card.open .meal-body{display:block}
.ing-label{font-size:10px;font-weight:600;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin:12px 0 8px}
.ing-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid rgba(255,255,255,0.04)}
.ing-row:last-of-type{border-bottom:none}
.ing-name{font-size:13px;color:var(--text);font-weight:400}
.ing-amt{font-size:12px;color:var(--muted);font-weight:500;margin-left:12px;white-space:nowrap;font-family:'DM Mono',monospace}
.meal-tip{margin-top:10px;padding:10px;background:var(--surface2);border-radius:8px;font-size:12px;color:var(--muted);line-height:1.6}
.tip-bar{width:3px;border-radius:2px;background:var(--red);margin-right:10px;align-self:stretch;flex-shrink:0}
.tip-inner{display:flex;gap:0}
.low-tip .tip-bar{background:var(--green)}

/* FOOTER */
.footer{margin:20px 16px 0;padding:14px;background:var(--surface);border-radius:10px;border:1px solid var(--border);text-align:center}
.footer-water{font-size:12px;color:#60a5fa;font-weight:600;margin-bottom:6px}
.footer-note{font-size:11px;color:var(--muted);line-height:1.6}
.footer-note strong{color:var(--text)}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.anim{animation:fadeUp .22s ease both}
</style>
</head>

  <!-- HERO with anime image -->

    <img class="hero-img" id="heroImg" src="" alt=""/>
    <div class="hero-overlay"></div>

      <div class="hero-badge">🔥 Carb Cycle</div>
      <div class="hero-title">MEAL <span>PLAN</span></div>

    </div>

  <!-- TABS -->
  <div class="tabs" id="tabs"></div>

  <!-- CONTENT -->
  <div id="content"></div>

  <!-- FOOTER -->

</div>

let activeDay = 'fri';
let expanded = {};

function pct(val, total){ return Math.round((val*4/(total||1))*100) }

function renderTabs(){
  const keys = Object.keys(PLAN.days);
  document.getElementById('tabs').innerHTML = keys.map(k => {
    const d = PLAN.days[k];
    const isA = activeDay === k;
    const cls = isA ? `tab active active-${d.type}` : 'tab';
    return `<div class="${cls}" onclick="setDay('${k}')">
      <span class="tab-name">${d.name} <span style="color:var(--muted);font-weight:400;font-size:11px">${d.date}</span></span>
      <span class="tab-type">${d.label}</span>
    </div>`;
  }).join('');
}

function renderContent(){
  const d = PLAN.days[activeDay];
  const hi = d.type === 'high';
  const ac = hi ? 'var(--red)' : 'var(--green)';
  const m = d.macros;
  const totalCals = m.pro*4 + m.carb*4 + m.fat*9;
  const pPct = Math.round(m.pro*4/totalCals*100);
  const cPct = Math.round(m.carb*4/totalCals*100);
  const fPct = Math.round(m.fat*9/totalCals*100);

  const meals = d.meals.map((meal, idx) => {
    const isEx = !!expanded[idx];
    const ings = isEx ? meal.ings.map(([n,a]) =>
      `<div class="ing-row"><span class="ing-name">${n}</span><span class="ing-amt">${a}</span></div>`
    ).join('') : '';
    const body = isEx ? `<div class="meal-body">
      <div class="ing-label">Ingredients & Amounts</div>
      ${ings}
      <div class="meal-tip">
        <div class="tip-inner ${hi?'':'low-tip'}">
          <div class="tip-bar"></div>
          <div>${meal.tip}</div>
        </div>
      </div>
    </div>` : '';
    return `<div class="meal-card ${isEx?'open':''}" onclick="toggle(${idx})">
      <div class="meal-head">
        <div class="meal-icon-wrap">${meal.icon}</div>
        <div class="meal-info">
          <div class="meal-time-label">${meal.time}</div>
          <div class="meal-title">${meal.name}</div>
          <div class="meal-chips">
            <span class="chip chip-kcal">${meal.macros.kcal} kcal</span>
            <span class="chip chip-p">${meal.macros.p}g P</span>
            <span class="chip chip-c">${meal.macros.c}g C</span>
            <span class="chip chip-f">${meal.macros.f}g F</span>
          </div>
        </div>
        <div class="chevron">⌄</div>
      </div>
      ${body}
    </div>`;
  }).join('');

  document.getElementById('content').innerHTML = `<div class="anim">
    <div class="section">
      <div class="day-badge ${d.type}">
        <div class="badge-dot"></div>
        <span class="badge-label">${d.label} DAY</span>
        <span class="badge-desc">${d.desc}</span>
      </div>
    </div>
    <div class="section">
      <div class="section-label">Daily Targets</div>
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-label">Calories</div>
          <div class="stat-val cal">${m.cal}</div>
          <div class="stat-unit">kcal/day</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Protein</div>
          <div class="stat-val pro">${m.pro}g</div>
          <div class="stat-unit">${Math.round(m.pro/160*100)/10}g per lb bodyweight</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Carbohydrates</div>
          <div class="stat-val carb">${m.carb}g</div>
          <div class="stat-unit">${m.carb*4} kcal from carbs</div>
        </div>
        <div class="stat-card">
          <div class="stat-label">Fat</div>
          <div class="stat-val fat">${m.fat}g</div>
          <div class="stat-unit">${m.fat*9} kcal from fat</div>
        </div>
        <div class="macro-bar-wrap">
          <div class="macro-bar-labels">
            <span class="macro-bar-label" style="color:#60a5fa;font-size:11px;font-weight:600">Protein ${pPct}%</span>
            <span class="macro-bar-label" style="color:#f59e0b;font-size:11px;font-weight:600">Carbs ${cPct}%</span>
            <span class="macro-bar-label" style="color:#ec4899;font-size:11px;font-weight:600">Fat ${fPct}%</span>
          </div>
          <div class="macro-bar-track">
            <div class="macro-bar-seg" style="width:${pPct}%;background:#60a5fa"></div>
            <div class="macro-bar-seg" style="width:${cPct}%;background:#f59e0b"></div>
            <div class="macro-bar-seg" style="width:${fPct}%;background:#ec4899"></div>
          </div>
          <div class="macro-bar-legend">
            <span class="legend-item"><span class="legend-dot" style="background:#60a5fa"></span>${m.pro*4} kcal protein</span>
            <span class="legend-item"><span class="legend-dot" style="background:#f59e0b"></span>${m.carb*4} kcal carbs</span>
            <span class="legend-item"><span class="legend-dot" style="background:#ec4899"></span>${m.fat*9} kcal fat</span>
          </div>
        </div>
      </div>
    </div>
    <div class="section">
      <div class="section-label">Meals — Tap to expand</div>
      ${meals}
    </div>
  </div>`;
}

function setDay(day){ activeDay = day; expanded = {}; renderTabs(); renderContent(); }
function toggle(idx){ expanded[idx] = !expanded[idx]; renderContent(); }

renderTabs();
renderContent();
</script>
</body>
</html>
